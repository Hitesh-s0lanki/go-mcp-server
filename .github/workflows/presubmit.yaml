name: Presubmit

on:
  pull_request:
    branches:
      - main
      - release

# Cancel superseded runs on the same PR.
concurrency:
  group: presubmit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Vet, Lint, Test, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify modules
        run: |
          go mod download
          go mod verify

      - name: go vet
        run: go vet ./...

      # golangci-lint v2 to match .golangci.yml (version: "2").
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

      # DB-backed tests skip automatically when DATABASE_URL is unset, so no
      # Postgres service is needed for the presubmit.
      - name: Run tests
        run: go test ./... -race -count=1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker image builds
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: go-mcp-server:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
